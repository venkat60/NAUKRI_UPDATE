name: Naukri Hourly Update

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  update:
    name: Run Naukri automation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Firefox for Playwright
        run: npx playwright install --with-deps firefox

      - name: Run Naukri automation
        run: npm run naukri:update
